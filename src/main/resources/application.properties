spring.application.name=parking
server.port=${SERVER_PORT:8080}

# Base de datos MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/urbanpark_parking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=root
spring.datasource.password=Kaiser2702
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# API externa del condominio (default)
core.api.url=${CORE_API_URL:https://sistemagestioncondominios-backend.onrender.com}

# JWT interno del SaaS
app.jwt.secret=${JWT_SECRET:UrbanParkParkingSaaS2026SecretKeyMustBeAtLeast256BitsLong!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Usuario SUPERADMIN inicial
app.saas.superadmin.email=${SAAS_SUPERADMIN_EMAIL:superadmin@urbanpark.com}
app.saas.superadmin.password=${SAAS_SUPERADMIN_PASSWORD:SuperAdmin123!}

# Correo (recuperación de contraseña - Sprint futuro)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Sincronización automática con API del condominio (ms)
app.sync.interval-ms=${SYNC_INTERVAL_MS:3600000}

# Swagger / OpenAPI (Spring Boot 4 + springdoc 3.x)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false
